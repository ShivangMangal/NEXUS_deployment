name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'Phase-2/Sutrava_Frontend-main/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Phase-2/Sutrava_Frontend-main/**'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd Phase-2/Sutrava_Frontend-main
          docker build -t nexus-frontend:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nexus-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # Keeps the build green even if vulns are found. Set to '1' if you want to block the build.
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
